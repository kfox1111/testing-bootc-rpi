# HA NAT router WAN DHCP client configuration.
# Shipped in the bootc image; identical on both nodes.

# dhcpcd only ever touches the WAN interface. LAN and heartbeat are
# NetworkManager-managed, and the WAN is unmanaged by NetworkManager.
allowinterfaces end0

# Both nodes must present an identical DHCP identity to the ISP. The DUID is
# stored in /var/lib/dhcpcd/duid, which is rsync-synced to the peer on every
# lease event, and the WAN MAC is cloned by the keepalived notify script.
duid

# Keep the address configured if dhcpcd exits unexpectedly.
persistent

# Use the saved lease when the DHCP server does not answer, even if the lease
# has expired. This is what keeps failover independent of the ISP's
# rate-limited DHCP server: the takeover node replays the synced lease and
# only *confirms* it upstream when the server is willing to talk.
lastleaseextend

# Fail fast on takeover: try INIT-REBOOT for 3 seconds, give up on discovery
# after 10 and fall back to the saved lease.
reboot 3
timeout 10

# Never fall back to a 169.254.x.x link-local address; the replayed lease
# (lastleaseextend) is always preferable. Note dhcpcd 10 still ARP-probes
# the address for a few seconds before binding - harmless, since the notify
# script has already configured the address before dhcpcd starts.
noipv4ll

# Single public IPv4 lease design; no IPv6 on the WAN.
noipv6rs
ipv4only
